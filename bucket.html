<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 버킷리스트 카드</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 기본 폰트 설정 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f2f5;
        }

        .card {
            width: 300px;
            margin: 60px auto;
            background: linear-gradient(135deg, #c2f8fb 0%, #a9f0de 100%);
            padding: 20px 20px 45px 20px;
            border-radius: 2px 2px 40px 2px;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.1);
            position: relative; 
            transform: rotate(-1.5deg);
            transition: all 0.3s ease;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 35px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 4px; 
            margin-bottom: 20px; 
        }

        .card h2 { 
            font-family: 'Nanum Pen Script', cursive;
            color: #2c3e50; 
            font-size: 2.2rem;
            margin-bottom: 15px; 
            line-height: 1;
            letter-spacing: -1px;
        }

        .card p { 
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 500;
            color: #444; 
            font-size: 1rem; 
            line-height: 1.6; 
            margin: 8px 0;
            letter-spacing: -0.5px;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: -15px;
            background-color: #2d3436; 
            color: #fff;
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 2px;
            transform: rotate(10deg);
            
            /* 핵심 수정 사항: z-index 추가 */
            z-index: 10; 
            /* 그림자를 추가해 이미지와 분리된 느낌을 줌 */
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2); 
        }

        .secret-memo {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 1.3rem;
            color: #451860;
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: rotate(0deg) translateY(-10px); /* 위로 살짝 들리는 효과 */
            box-shadow: 15px 15px 30px rgba(0,0,0,0.15);
        }

        .card:hover .secret-memo {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Romance</div>
        
        <img src="https://i.pinimg.com/1200x/52/4f/d4/524fd4ff7d4ec0becb1041a0d8076ce7.jpg" alt="바다 풍경">
        
        <h2>✨Yulchan's BucketList</h2>
        <p>🎮 1. 인디 게임 제작하기 </p>
        <p>🎨 2. 한 권의 노트 그림의 채워서 완성하기</p>
        <P>🎸 3. 친구들이랑 밴드 결성해서 연주해보기</P>
        <p>🎒 4. 혼자서 배낭 여행 가보기</p>
        <p>🏙️ 5. 친구들이랑 3박 4일 여행가기</p>
        
        <div class="secret-memo">🤫 사실 겁이 많아서 혼자 여행가기 두려움</div>
    </div>

</body>
</html>
