<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 버킷리스트 카드</title>
    <style>
        /* 기본 카드 디자인 (자유롭게 수정 가능) */
        .card {
            width: 300px;
            margin: 50px auto;
            background: linear-gradient(135deg, #f0f9ff 0%, #d9f8ff 100%);
            padding: 15px 15px 35px 15px;
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
            /* 배지의 기준점이 되기 위한 필수 속성 */
            position: relative; 
            transform: rotate(-3deg);
        }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 15px; }
        .card h2 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 10px; }
        .card p { color: #444; font-size: 1.1rem; line-height: 1.5; }
        .card:hover {transform: scale(1.05) rotate(0deg);z-index: 10;}

        /* 1. 배지 (absolute) 관련 CSS를 작성하세요 */
        .badge {
            position:absolute;
            top: -10px;
            right: 10px;
            font-weight: bold;
            width: 70px 40px;
            background-color: gold;
            border-radius: 15px;
            padding: 5px;
        }
            
       
 
        

        /* 2. 비밀 메모 (visibility) 및 hover 효과 관련 CSS를 작성하세요 */
        .secret-memo {
            visibility: hidden;
        }
        
        .card:hover .secret-memo {
            visibility: visible;
        }
        
        

        

    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Hot🔥</div>
        <img src="헬스장.png" alt="헬스장">
        
        <h2>✨ 안성헌의 꿈</h2>
        <p>💪 1. 운동해서 체력 키우기</p>
        <p>🚗 2. 운전 면허 도전하기</p>
        <div class="secret-memo">🤫 TMI: 귀차니즘 엄청 심함</div>
        </div>
    </body>
</html>
